version: "3.9"

services:
  uap:
    build: .
    ports:
      - "4100:4100"
    env_file: .env
    depends_on:
      uap-db:
        condition: service_healthy
      uap-redis:
        condition: service_started
    restart: unless-stopped

  uap-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: uap
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - uap-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  uap-redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    volumes:
      - uap-redis-data:/data

volumes:
  uap-db-data:
  uap-redis-data:
